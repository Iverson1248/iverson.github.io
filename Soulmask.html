    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: #1e293b;
            --accent-gold: #f59e0b;
        }
        body {
            background-color: var(--primary-bg);
            color: #e2e8f0;
            font-family: "Microsoft JhengHei", sans-serif;
        }
        .skill-card {
            background-color: var(--card-bg);
            border: 1px solid #334155;
            transition: all 0.2s ease;
            position: relative;
        }
        .skill-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-2px);
        }
        .skill-card.pinned {
            border-color: var(--accent-gold);
            background-color: #1e1b12; /* 稍微帶點金色的暗底 */
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.1);
        }
        .ids-tag {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        .multi-btn {
            background-color: #0f172a;
            border: 1px solid #475569;
            color: #94a3b8;
            transition: all 0.2s;
            cursor: pointer;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .multi-btn:hover {
            border-color: var(--accent-gold);
            color: #fff;
        }
        .multi-btn.active {
            background-color: var(--accent-gold);
            border-color: #fff;
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease forwards;
        }
        /* 自定義 Checkbox 樣式 */
        .pin-checkbox {
            appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid #475569;
            border-radius: 0.25rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .pin-checkbox:checked {
            background-color: var(--accent-gold);
            border-color: var(--accent-gold);
        }
        .pin-checkbox:checked::after {
            content: '📌';
            font-size: 0.75rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

        ];

        // 核心狀態
        let selectedFactions = new Set(['全部']);
        let selectedJobs = new Set(['全部']);
        let pinnedIds = new Set(); // 儲存已勾選的 ID

        function setupMultiSelect(containerId, set) {
            const buttons = document.querySelectorAll(`#${containerId} .multi-btn`);
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const val = btn.getAttribute('data-value');
                    if (val === '全部') {
                        set.clear();
                        set.add('全部');
                    } else {
                        set.delete('全部');
                        if (set.has(val)) {
                            set.delete(val);
                            if (set.size === 0) set.add('全部');
                        } else {
                            set.add(val);
                        }
                    }
                    buttons.forEach(b => {
                        const bVal = b.getAttribute('data-value');
                        if (set.has(bVal)) b.classList.add('active');
                        else b.classList.remove('active');
                    });
                    renderTalents();
                });
            });
        }

        function togglePin(id) {
            if (pinnedIds.has(id)) {
                pinnedIds.delete(id);
            } else {
                pinnedIds.add(id);
            }
            document.getElementById('pinTotal').innerText = pinnedIds.size;
            renderTalents();
        }

        function renderTalents() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryValue = document.getElementById('categorySelect').value;
            const grid = document.getElementById('talentGrid');
            const noResults = document.getElementById('noResults');
            const countDisplay = document.getElementById('resultCount');

            // 1. 先分離「已鎖定(置頂)」與「未鎖定」的天賦
            const pinnedList = talents.filter(t => pinnedIds.has(t.ids));
            const unpinnedList = talents.filter(t => !pinnedIds.has(t.ids));

            // 2. 對「未鎖定」的部分進行篩選
            const filteredUnpinned = unpinnedList.filter(t => {
                const matchSearch = t.name.toLowerCase().includes(searchTerm) || 
                                    t.desc.toLowerCase().includes(searchTerm) ||
                                    t.ids.includes(searchTerm);
                
                const matchCategory = categoryValue === "全部" || t.category.includes(categoryValue);
                const factionMatch = selectedFactions.has('全部') || selectedFactions.has(t.faction);
                const jobMatch = selectedJobs.has('全部') || selectedJobs.has(t.job);
                
                return matchSearch && matchCategory && factionMatch && jobMatch;
            });

            // 3. 合併結果：置頂天賦 + 篩選後的未置頂天賦
            const finalDisplay = [...pinnedList, ...filteredUnpinned];

            if (finalDisplay.length === 0) {
                grid.innerHTML = "";
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                grid.innerHTML = finalDisplay.map(t => {
                    const isPinned = pinnedIds.has(t.ids);
                    return `
                        <div class="skill-card p-5 rounded-lg flex gap-4 border-l-4 ${isPinned ? 'pinned border-l-amber-500' : 'border-l-slate-700/30'} animate-fadeIn">
                            <!-- 勾選框 -->
                            <div class="flex flex-col items-center justify-center">
                                <input type="checkbox" class="pin-checkbox" ${isPinned ? 'checked' : ''} onchange="togglePin('${t.ids}')">
                            </div>

                            <!-- 圖示 -->
                            <div class="w-16 h-16 bg-slate-900 rounded flex-shrink-0 border border-slate-700 flex items-center justify-center text-3xl shadow-inner">
                                <img src="${t.icon}" alt="這是圖片" title="${t.name}">
                            </div>

                            <!-- 內容 -->
                            <div class="flex-grow">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <div class="flex items-center gap-2">
                                            <h3 class="text-xl font-bold text-white">${t.name}</h3>
                                            ${isPinned ? '<span class="text-[10px] bg-amber-500 text-black px-1.5 py-0.5 rounded font-black tracking-tighter">LOCKED</span>' : ''}
                                        </div>
                                        <span class="ids-tag mt-1 inline-block">ID: ${t.ids}</span>
                                    </div>
                                    <div class="flex flex-col items-end gap-1">
                                        <span class="text-[10px] bg-amber-600/20 text-amber-500 px-2 py-0.5 rounded border border-amber-600/30 font-bold uppercase">${t.faction}</span>
                                        <div class="flex flex-wrap gap-1 justify-end">
                                            ${t.category.map(cat => `<span class="text-[10px] bg-slate-700 text-slate-300 px-2 py-0.5 rounded">${cat}</span>`).join('')}
                                        </div>
                                    </div>
                                </div>
                                <p class="mt-3 text-slate-300 text-sm leading-relaxed bg-slate-900/30 p-2.5 rounded">
                                    ${t.desc}
                                </p>
                                <div class="mt-4 flex justify-between items-center text-[12px]">
                                    <div class="flex gap-3">
                                        <span class="text-slate-400">專屬職業：<b class="text-slate-200">${t.job}</b></span>
										<span class="text-slate-400">LV：<b class="text-slate-200">${t.lv}</b></span>
										<span class="text-slate-400">冷卻：<b class="text-slate-200">${t.cooldown}</b></span>
                                    </div>
                                    <div class="text-slate-500 italic text-[10px]">
                                        來源: ${t.source}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            countDisplay.innerText = `目前顯示：${finalDisplay.length} 項 (含鎖定 ${pinnedIds.size} 項)`;
        }

        function resetFilters() {
            document.getElementById('searchInput').value = "";
            document.getElementById('categorySelect').value = "全部";
            
            selectedFactions.clear();
            selectedFactions.add('全部');
            document.querySelectorAll('#factionButtons .multi-btn').forEach(b => {
                if(b.getAttribute('data-value') === '全部') b.classList.add('active');
                else b.classList.remove('active');
            });

            selectedJobs.clear();
            selectedJobs.add('全部');
            document.querySelectorAll('#jobButtons .multi-btn').forEach(b => {
                if(b.getAttribute('data-value') === '全部') b.classList.add('active');
                else b.classList.remove('active');
            });

            renderTalents();
        }

        document.addEventListener('DOMContentLoaded', () => {
            setupMultiSelect('factionButtons', selectedFactions);
            setupMultiSelect('jobButtons', selectedJobs);
            document.getElementById('searchInput').addEventListener('input', renderTalents);
            document.getElementById('categorySelect').addEventListener('change', renderTalents);
            renderTalents();
        });
    </script>
