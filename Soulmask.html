<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈魂面甲 Soulmask - 天賦資料庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: #1e293b;
            --accent-gold: #f59e0b;
        }
        body {
            background-color: var(--primary-bg);
            color: #e2e8f0;
            font-family: "Microsoft JhengHei", sans-serif;
        }
        .skill-card {
            background-color: var(--card-bg);
            border: 1px solid #334155;
            transition: all 0.2s ease;
        }
        .skill-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-2px);
        }
        .ids-tag {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        /* 多選按鈕樣式 */
        .multi-btn {
            background-color: #0f172a;
            border: 1px solid #475569;
            color: #94a3b8;
            transition: all 0.2s;
            cursor: pointer;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .multi-btn:hover {
            border-color: var(--accent-gold);
            color: #fff;
        }
        .multi-btn.active {
            background-color: var(--accent-gold);
            border-color: #fff;
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease forwards;
        }
    </style>
</head>
<body>

    <nav class="bg-slate-900 border-b border-slate-700 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-amber-500">SOULMASK <span class="text-white font-light text-lg ml-2">天賦技能資料庫</span></h1>
            <div class="space-x-6 hidden md:flex text-sm">
                <a href="#" class="hover:text-amber-500 transition">首頁</a>
                <a href="#" class="text-amber-500 border-b-2 border-amber-500">自然天賦</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <!-- 搜尋與進階過濾器 -->
        <section class="mb-8 bg-slate-800 p-6 rounded-xl shadow-lg border border-slate-700">
            <div class="space-y-6">
                <!-- 第一行：關鍵字與類別 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wider">關鍵字搜尋</label>
                        <input type="text" id="searchInput" placeholder="搜尋名稱、IDS 或描述..." class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-amber-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wider">天賦類別</label>
                        <select id="categorySelect" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-amber-500 outline-none appearance-none bg-[url('data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20fill%3D%22none%22%20viewBox%3D%220%200%2024%2024%22%20stroke%3D%22%2394a3b8%22%3E%3Cpath%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%20stroke-width%3D%222%22%20d%3D%22M19%209l-7%207-7-7%22%3E%3C%22%2Fsvg%3E')] bg-no-repeat bg-[position:right_0.5rem_center] bg-[length:1.5em_1.5em]">
                            <option value="全部">全部類別</option>
                            <option value="戰鬥類">戰鬥類</option>
                            <option value="通用類">通用類</option>
                            <option value="工作類">工作類</option>
                        </select>
                    </div>
                </div>

                <!-- 第二行：陣營多選 -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wider">所屬陣營 (多選)</label>
                    <div id="factionButtons" class="flex flex-wrap gap-2">
                        <button class="multi-btn active" data-value="全部">全部</button>
                        <button class="multi-btn" data-value="火石">火石</button>
                        <button class="multi-btn" data-value="毒牙">毒牙</button>
                        <button class="multi-btn" data-value="利爪">利爪</button>
                        <button class="multi-btn" data-value="荒狼">荒狼</button>
                        <button class="multi-btn" data-value="蠻角">蠻角</button>
                    </div>
                </div>

                <!-- 第三行：職業多選 -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wider">推薦職業 (多選)</label>
                    <div id="jobButtons" class="flex flex-wrap gap-2">
                        <button class="multi-btn active" data-value="全部">全部</button>
                        <button class="multi-btn" data-value="力工">力工</button>
                        <button class="multi-btn" data-value="雜工">雜工</button>
                        <button class="multi-btn" data-value="匠人">匠人</button>
                        <button class="multi-btn" data-value="獵人">獵人</button>
                        <button class="multi-btn" data-value="護衛">護衛</button>
                        <button class="multi-btn" data-value="戰士">戰士</button>
                    </div>
                </div>
            </div>

            <div class="mt-6 flex justify-between items-center text-xs border-t border-slate-700 pt-4">
                <span class="text-slate-400" id="resultCount">計算中...</span>
                <span class="text-amber-500 font-mono">FILTER_LOGIC: (Faction AND Job) AND Category_Contains</span>
            </div>
        </section>

        <!-- 資料列表容器 -->
        <div id="talentGrid" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- JavaScript 動態渲染 -->
        </div>

        <div id="noResults" class="hidden text-center py-24">
            <div class="text-5xl mb-4">🔍</div>
            <p class="text-xl text-slate-500 font-light">找不到符合條件的天賦資料</p>
            <button onclick="resetFilters()" class="mt-4 text-amber-500 hover:underline">清除所有過濾條件</button>
        </div>

    </main>

    <footer class="mt-20 border-t border-slate-700 p-10 text-center text-slate-500 text-sm bg-slate-900/50">
        <p>© 2026 靈魂面甲繁體資料庫</p>
    </footer>

			{ids:"160373",name:"氣定神閒 (Calm and Peaceful)",category:["戰鬥類"],faction:"毒牙",job:"通用",desc:"【毒牙專屬】從容優雅地應對戰鬥，12秒內沒有受到任何傷害即會獲得一層攻擊力提升2%，攻擊速度提升2%，暴擊提升3%，暴擊傷害提升4%，但受到傷害少量提升的效果，至多疊加5層，每次受到傷害移除一層。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_qidingshenxian.webp",lv:"3",cooldown:"無",source:"自然天賦"},

			{ids:"160443",name:"撕裂傷口 (Tear Wound)",category:["戰鬥類"],faction:"毒牙",job:"通用",desc:"【毒牙專屬】破壞傷口，對正在流血的目標造成的傷害提升15%。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_silieshangkou.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"160453",name:"捨命相搏 (Fight to Death)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"奮力反擊無暇防守，受到攻擊有20%機率使自身造成的傷害提升40%，但受到的傷害也會提升40%，持續15s。(CD：25s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_shemingxiangbo.webp",lv:"3",cooldown:"25s",source:"自然天賦"},
			{ids:"160463",name:"浴血恢復 (Bloodbath Recovery)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"鮮血即生命，受到攻擊時有20%的機率舔血恢復，每秒恢復基於自身攻擊力30%的生命值，持續15s，在此期間受流血狀態損失的生命將轉換為1.5倍的生命恢復。(CD：25s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_yuxuehuifu.webp",lv:"3",cooldown:"25s",source:"自然天賦"},
			{ids:"160473",name:"兩敗俱傷 (Lose-lose)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"以痛苦換取力量，被攻擊到弱點部位時有25%機率15s內對敵人的弱點部位傷害提升60%，但自己的弱點受到傷害也會提升60%。持續15s(CD：25s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_liangbaijushang.webp",lv:"3",cooldown:"25s",source:"自然天賦"},
			{ids:"160483",name:"勢大力沉 (Overwhelming Force)",category:["戰鬥類"],faction:"利爪",job:"通用",desc:"【利爪專屬】每一擊都勢大力沉，對目標造成傷害時額外消耗15體力以使本次傷害提升15%，並額外消耗目標10點體力。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_shidalichen.webp",lv:"3",cooldown:"無",source:"自然天賦"},

			{ids:"160513",name:"技巧恢復 (Skill Recovery)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"掌握精妙的恢復時機，成功彈反敵人的攻擊後將恢復本次傷害35%的生命值。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_jiqiaohuifu.webp",lv:"3",cooldown:"無",source:"自然天賦"},

			{ids:"160543",name:"敵隕狂熱 (Enemy Down Fervency)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"每當有敵人戰敗則會愈發興奮，自己10米內有敵人瀕死或死亡時，獲得3次抵擋攻擊傷害的效果，受到攻擊即消耗1次。(CD：40s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_disunkuangre.webp",lv:"3",cooldown:"40s",source:"自然天賦"},
			{ids:"160553",name:"手段殘忍 (Merciless Means)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"被自己擊殺的敵人死狀異常慘烈，削弱屍體10米範圍內的敵人使其攻擊速度降低15%，暴抗降低20%，防禦降低200，持續20s。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_shouduancairen.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"160563",name:"屠戮狂熱 (Slaughter Fervency)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"手刃敵人的快感無以言表，每使一名敵人瀕死或死亡，自身將獲得10s霸體並且在此期間暴抗極大幅度提升。(CD：30s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_tulukuangre.webp",lv:"3",cooldown:"30s",source:"自然天賦"},
			{ids:"160573",name:"堅定不移 (Determined)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"沉著冷靜臨危不亂，6s內沒有任何移動會獲得一層攻擊力提升2%，攻擊速度提升2%，暴擊提升3%，暴擊傷害提升4%，但受到傷害少量提升的效果，至多疊加5層，移動後會移除所有效果。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_jiandingbuyi.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"160583",name:"致命節奏 (Fatal Rhythm)",category:["戰鬥類"],faction:"利爪",job:"通用",desc:"【利爪專屬】戰鬥節奏畫在掌控，攻擊敵人時體力在70%以上則會獲得一層攻擊力、攻擊速度提升4%的效果，持續10s，至多疊加5層。(不滿足則會移除所有效果 )",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_zhimingjiezou.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"160593",name:"直擊要害 (Go for the Jugular)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"雙目如雄鷹般犀利，攻擊15米外敵人的弱點部位時使本次部位傷害提升25%。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_zhijiyaohai.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"160603",name:"避開要害 (Avoid Vitals)",category:["戰鬥類"],faction:"火石",job:"通用",desc:"【火石專屬】距離越遠的攻擊對自己威脅越小，受到來自10米外的攻擊時，有20%的機率使本次受到的傷害降低80%。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_bikaiyaohai.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"160613",name:"鋼鐵之軀 (Steel Body)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"受到攻擊時若當前韌性超過50%則免疫本次硬直。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_gangtiezhiqu.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"160623",name:"毒軀 (Poisoned Body)",category:["戰鬥類"],faction:"毒牙",job:"通用",desc:"【毒牙專屬】身體攜帶強力壽素，攻擊命中目標時有15%機率對其造成一層持續傷害、流逝體力、精神虛弱的中壽效果，持續10秒，至多疊加5層。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_duqu.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"160633",name:"心念合一 (Mind-Heart Unison)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"攻勢凌厲身心合一，攻擊命中目標時有20%的機率使自己進入心流，在10s內自己所有機率觸發的天賦必定觸發。(CD：25s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_xinnianheyi.webp",lv:"3",cooldown:"25s",source:"自然天賦"},
			{ids:"160643",name:"穿透防禦 (PEN DEF)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"攻擊命中目標時有15%的機率使本次攻擊無視目標防禦。(CD：2s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_chuantoufangyu.webp",lv:"3",cooldown:"2s",source:"自然天賦"},
			{ids:"160653",name:"挫敵銳氣 (Morale Dampener)",category:["戰鬥類"],faction:"利爪",job:"通用",desc:"【利爪專屬】凶猛的攻勢讓敵人聞風喪膽，攻擊命中目標時有15%的機率對其造成攻擊降低3%，防禦降低2%，移動速度降低5%的效果，持續15s，至多疊加5層。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_cuodiruiqi.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"160663",name:"抑制暴力 (Suppress Violence)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"用力量讓敵人屈服，攻擊命中目標時有15%的機率對其造成暴擊率降低7%的效果，持續15s，至多疊加5層。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_yizhibaoli.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"160673",name:"惡意 (Malice)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"對狀態異常的敵人心生惡意，攻擊5米內處於中壽、燒傷、流血狀態的目標時，有15%的機率使自己獲得一層暴擊率提升3%、暴擊傷害提升4%的效果，持續10s，至多疊加5層。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_eyi.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"160683",name:"醉意威應 (Drunken Senses)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"酒醉人不醉，在飲酒後的15s內可閃避3次攻擊，喜好飲酒者會獲得更多次數。(CD：30s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__zuitaiganying.webp",lv:"3",cooldown:"30s",source:"自然天賦"},
			{ids:"160693",name:"猛攻 (Onslaught)",category:["戰鬥類"],faction:"通用",job:"戰士",desc:"【戰士專屬】以猛獸般的攻勢壓制敵人，清空目標韌性時會移除其霸體狀態，12s內攻擊速度提升10%，若每擊傷害超過目標最大生命5%則恢復體力。(CD：30s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__menggong.webp",lv:"3",cooldown:"30s",source:"自然天賦"},
			{ids:"160893",name:"磐石意志 (Rock-like Resolve)",category:["戰鬥類"],faction:"通用",job:"衛士",desc:"【衛士專屬】成功防禦敵人的攻擊後，使自身的昏迷、麻痺、流血抗性提升80%持續12s。(CD：30s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__panshiyizhi.webp",lv:"3",cooldown:"30s",source:"自然天賦"},
			{ids:"160903",name:"以牙還牙 (Tit for Tat)",category:["戰鬥類"],faction:"利爪",job:"通用",desc:"【利爪專屬】威受痛苦強勢回擊，受到攻擊時有20%的機率觸發能夠在8s內累積傷害，在此期間攻擊到敵人時將對其釋放當前累積到的所有傷害。(CD：30s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_yiyahuanya.webp",lv:"3",cooldown:"30s",source:"自然天賦"},
			{ids:"160913",name:"格擋反擊 (Riposte)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"使用非盾牌武器防禦近距離攻擊時，有20%的機率額外消耗30點體力使攻擊者在5秒內陷入無力狀態，攻擊力大幅降低。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_gedangfanji.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"160923",name:"怒火傾瀉 (Pouring Rage)",category:["戰鬥類"],faction:"毒牙",job:"通用",desc:"【毒牙專屬】積蓄怒火一擊致命，受到攻擊時有20%的機率觸發累積8s內受到的所有傷害，在累積結束後的8s內攻擊到敵人時將對其釋放累積的所有傷害。(CD：30s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_nuhuoqingxie.webp",lv:"3",cooldown:"30s",source:"自然天賦"},
			{ids:"160933",name:"後發制人 (Strikeback)",category:["戰鬥類"],faction:"毒牙",job:"通用",desc:"【毒牙專屬】 觀察進攻伺機而動，成功閃避敵人2次攻擊後(每次間隔不超過6s)，接下來7s內的攻擊可以無視敵人防禦力。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_houfazhiren.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"160943",name:"激發鬥志 (Stimulate Morale)",category:["戰鬥類"],faction:"火石",job:"通用",desc:"【火石專屬】痛苦喚醒自我仇恨啟動潛能，受到攻擊時有20%機率進入心流，在10s內自己所有機率觸發的天賦必定觸發。(CD：25s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_jifadouzhi.webp",lv:"3",cooldown:"25s",source:"自然天賦"},
			{ids:"160953",name:"絕境應激 (Desperate Response)",category:["戰鬥類"],faction:"毒牙",job:"通用",desc:"【毒牙專屬】瀕臨死亡時激起強烈的求生欲，生命值低於30%時，每次受到攻擊時至多失去3%最大生命。(受到傷害超過生命上限時無法生效)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_juejingyingji.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"160963",name:"化解危機 (Crisis Resolution)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"沒點絕活怎麼在這片土地生存，有15%的機率觸發，受到攻擊時使這次傷害至多失去3%最大生命。(受到傷害超過生命上限時無法生效)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_huajieweiji.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"160973",name:"出血抑制 (Blood Staunching)",category:["戰鬥類"],faction:"毒牙",job:"通用",desc:"【毒牙專屬】凝血速度異於常人，在受到攻擊時有15%的機率觸發，移除自身的流血效果並在12秒內不會受到流血效果影響。(CD：30s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__chuxueyizhi.webp",lv:"3",cooldown:"30s",source:"自然天賦"},
			{ids:"170003",name:"微風勁雨 (Breezy Downpour)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"使自己的移動速度永久減少30%，但自身攻擊速度增加30%。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__weifengjinyu.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"170013",name:"群狼庇護 (Wolf Pack Protection)",category:["戰鬥類"],faction:"荒狼",job:"通用",desc:"【荒狼專屬】在生命值回滿或者從瀕死回到正常狀態時，使自己及10米範圍內的友方族人不會受到絕大多數減速效果影響，持續12s。(CD：30s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__qunlangpihu.webp",lv:"3",cooldown:"30s",source:"自然天賦"},
			{ids:"170023",name:"蠻角庇護 (Protection of the Savagehorn)",category:["戰鬥類"],faction:"蠻角",job:"通用",desc:"【蠻角專屬】在生命值回滿或者從瀕死回 到正常狀態時，使自己及10米範圍內的友方族人不會被造成暴擊，持續12s。(CD：30s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__manjiaobihu.webp",lv:"3",cooldown:"30s",source:"自然天賦"},
			{ids:"170033",name:"迴光反擊 (Last Light Counter)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"在生命值回滿或者從瀕死回到正常狀態後的6s內，受到來自5米以內的攻擊，回饋100%傷害給攻擊者。(CD：30s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__huiguangfanji.webp",lv:"3",cooldown:"30s",source:"自然天賦"},
			{ids:"170043",name:"攫體化血 (Body-Blood Conversion)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"生命值低於50%時觸發，在12s內受到的傷害將轉換為同比例的體力傷害，在此期間體力不會自然恢復，直至體力耗盡。(CD：30s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__juetihuaxue.webp",lv:"3",cooldown:"30s",source:"自然天賦"},
			{ids:"170053",name:"攫體化韌 (Body-Resilience Conversion)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"生命值低於50%時觸發，在12s內受到的韌性傷害轉換為體力傷害，在此期間體力不會自然恢復，直至體力殆盡。(CD：30s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__juetihuaren.webp",lv:"3",cooldown:"30s",source:"自然天賦"},
			{ids:"170063",name:"強韌癒合 (Resilient Healing)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"生命值高於70%以上時受到傷害，每秒恢復基於防禦力30%的生命至滿。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__tanxinghuifu.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"170073",name:"誓死決心 (Unyielding Will)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"生命值低於50%時觸發，無法閃避，但也不會受到任何硬直，持續25s。(CD：60s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__shisijuexin.webp",lv:"3",cooldown:"60s",source:"自然天賦"},
			{ids:"170083",name:"餘燼 (Embers)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"生命耗盡時不會進入瀕死，在12s內可額外承受9次致死攻擊，效果時問內次數耗盡則立即死亡。(CD：45s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__yujin.webp",lv:"3",cooldown:"45s",source:"自然天賦"},
			{ids:"170093",name:"體力虹吸 (Stamina Siphon)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"攻擊命中目標時有15%機率觸發，使其在12s內每次攻擊額外消耗20點體力為施加者恢復20點體力。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__tilihongxi.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"170103",name:"竭血逐攻 (Bloodfury Pursuit)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"攻擊命中目標時15%機率觸發，在12s內降低自身50%最大生命換成增加50%攻擊力(至多150點)。(CD：30s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__jiexuezhugong.webp",lv:"3",cooldown:"30s",source:"自然天賦"},
			{ids:"170113",name:"免傷祈佑 (Damage Immunity Blessing)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"受到攻擊時有15%機率觸發，在12s內敵人對自己造成的傷害始終以最低值進行計算。(CD：30s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__mianshangqiyou.webp",lv:"3",cooldown:"30s",source:"自然天賦"},
			{ids:"170123",name:"染血荊棘 (Bloodstained Thorns)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"當自身處於流血狀態時，也會將流血效果傳遞給3米範圍內的敵人。",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_xueranjingji.webp",lv:"3",cooldown:"無",source:"自然天賦"},
			{ids:"170133",name:"生命枷鎖 (Life Shacles)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"受到攻擊時有15%機率觸發，在25s內完全失去生命恢復能力，但每次受到傷害至多失去2%最大生命。(CD：60s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_shengmingjiesuo.webp",lv:"3",cooldown:"60s",source:"自然天賦"},
			{ids:"170143",name:"嫁禍 (Scapegoat)",category:["戰鬥類"],faction:"蠻角",job:"通用",desc:"【蠻角專屬】受到攻擊時有15%機率觸發，在12s內，能將敵人施加的持續效果轉移到15米範圍內其他敵人身上。(CD：30s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_jiahuo.webp",lv:"3",cooldown:"30s",source:"自然天賦"},
			{ids:"170153",name:"狡詐 (Cunning)",category:["戰鬥類"],faction:"荒狼",job:"通用",desc:"【荒狼專屬】受到攻擊時有15%機率觸發，在12s內，能將敵人施加的持續效果返還給施加者。(CD：30s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu_jiaozha.webp",lv:"3",cooldown:"30s",source:"自然天賦"},
			{ids:"170163",name:"禁忌之軀 (Tabooed Body)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"受到攻擊時有15%機率觸發，使攻擊者在15s內所有天賦無法觸發。(CD：40s)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__jinjizhiqu.webp",lv:"3",cooldown:"40s",source:"自然天賦"},
			{ids:"170173",name:"暴走 (Rampage)",category:["戰鬥類"],faction:"通用",job:"通用",desc:"身體存在點燃、中毒、流血任意減益效果時，進入15s「暴走」狀態：增加20%攻速、移速，有20%機率將造成傷害的25%轉化為生命恢復，免疫絕大部分減速效果。(CD：30S)",icon:"https://saraserenity.net/soulmask/img/ng/tianfu__baozou.webp",lv:"3",cooldown:"30s",source:"自然天賦"},

        // 狀態管理
        let selectedFactions = new Set(['全部']);
        let selectedJobs = new Set(['全部']);

        function setupMultiSelect(containerId, set) {
            const buttons = document.querySelectorAll(`#${containerId} .multi-btn`);
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const val = btn.getAttribute('data-value');
                    
                    if (val === '全部') {
                        set.clear();
                        set.add('全部');
                    } else {
                        set.delete('全部');
                        if (set.has(val)) {
                            set.delete(val);
                            if (set.size === 0) set.add('全部');
                        } else {
                            set.add(val);
                        }
                    }
                    
                    // 更新 UI 狀態
                    buttons.forEach(b => {
                        const bVal = b.getAttribute('data-value');
                        if (set.has(bVal)) b.classList.add('active');
                        else b.classList.remove('active');
                    });
                    
                    renderTalents();
                });
            });
        }

        function renderTalents() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryValue = document.getElementById('categorySelect').value;
            
            const grid = document.getElementById('talentGrid');
            const noResults = document.getElementById('noResults');
            const countDisplay = document.getElementById('resultCount');

            const filtered = talents.filter(t => {
                // 1. 基礎關鍵字搜尋 (AND)
                const matchSearch = t.name.toLowerCase().includes(searchTerm) || 
                                    t.desc.toLowerCase().includes(searchTerm) ||
                                    t.ids.includes(searchTerm);
                
                // 2. 類別篩選 (只要天賦類別陣列中含有選中的類別即可)
                const matchCategory = categoryValue === "全部" || t.category.includes(categoryValue);
                
                // 3. 陣營與職業 (AND 邏輯：必須同時滿足選中的陣營群組與職業群組)
                const factionMatch = selectedFactions.has('全部') || selectedFactions.has(t.faction);
                const jobMatch = selectedJobs.has('全部') || selectedJobs.has(t.job);
                
                return matchSearch && matchCategory && factionMatch && jobMatch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = "";
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                grid.innerHTML = filtered.map(t => `
                    <div class="skill-card p-5 rounded-lg flex gap-4 border-l-4 border-l-amber-500/30 hover:border-l-amber-500 animate-fadeIn">
                        <div class="w-16 h-16 bg-slate-900 rounded flex-shrink-0 border border-slate-700 flex items-center justify-center text-3xl shadow-inner">
                            <img src="${t.icon}"  alt="這是圖片" title="${t.name}">
                        </div>
                        <div class="flex-grow">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="text-xl font-bold text-white">${t.name}</h3>
                                    <span class="ids-tag mt-1 inline-block">ID: ${t.ids}</span>
                                </div>
                                <div class="flex flex-col items-end gap-1">
                                    <span class="text-[10px] bg-amber-600/20 text-amber-500 px-2 py-0.5 rounded border border-amber-600/30 font-bold uppercase">${t.faction}</span>
                                    <div class="flex flex-wrap gap-1 justify-end">
                                        ${t.category.map(cat => `<span class="text-[10px] bg-slate-700 text-slate-300 px-2 py-0.5 rounded">${cat}</span>`).join('')}
                                    </div>
                                </div>
                            </div>
                            <p class="mt-3 text-slate-300 text-sm leading-relaxed bg-slate-900/30 p-2.5 rounded">
                                ${t.desc}
                            </p>
                            <div class="mt-4 flex justify-between items-center text-[12px]">
                                <div class="flex gap-3">
                                    <span class="text-slate-400">專屬職業：<b class="text-slate-200">${t.job}</b></span>
									<span class="text-slate-400">LV：<b class="text-slate-200">${t.lv}</b></span>
                                    <span class="text-slate-400">冷卻：<b class="text-slate-200">${t.cooldown}</b></span>
                                </div>
                                <div class="text-slate-500 italic text-[10px]">
                                    來源: ${t.source}
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            
            countDisplay.innerText = `篩選結果：${filtered.length} 項 / 資料庫：${talents.length} 項`;
        }

        function resetFilters() {
            document.getElementById('searchInput').value = "";
            document.getElementById('categorySelect').value = "全部";
            
            selectedFactions.clear();
            selectedFactions.add('全部');
            document.querySelectorAll('#factionButtons .multi-btn').forEach(b => {
                if(b.getAttribute('data-value') === '全部') b.classList.add('active');
                else b.classList.remove('active');
            });

            selectedJobs.clear();
            selectedJobs.add('全部');
            document.querySelectorAll('#jobButtons .multi-btn').forEach(b => {
                if(b.getAttribute('data-value') === '全部') b.classList.add('active');
                else b.classList.remove('active');
            });

            renderTalents();
        }

        document.addEventListener('DOMContentLoaded', () => {
            setupMultiSelect('factionButtons', selectedFactions);
            setupMultiSelect('jobButtons', selectedJobs);
            
            document.getElementById('searchInput').addEventListener('input', renderTalents);
            document.getElementById('categorySelect').addEventListener('change', renderTalents);
            
            renderTalents();
        });
    </script>
</body>
